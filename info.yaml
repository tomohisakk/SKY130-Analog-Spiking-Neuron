    ui[4]: ""
    ui[5]: ""
    ui[6]: ""
    ui[7]: ""

    uo[0]: "VOUT"
    uo[1]: ""
    uo[2]: ""
    uo[3]: ""
    uo[4]: ""
    uo[5]: ""
    uo[6]: ""
    uo[7]: ""

    uio[0]: ""
    uio[1]: ""
    uio[2]: ""
    uio[3]: ""
    uio[4]: ""
    uio[5]: ""
    uio[6]: ""
    uio[7]: ""

  analog:
    - "IEXT"
    - "VBIAS_A"
